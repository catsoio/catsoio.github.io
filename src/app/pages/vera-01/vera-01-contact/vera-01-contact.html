<section id="demo" class="relative py-20 lg:py-32 border-t border-slate-800/50 overflow-hidden">
	<div class="absolute inset-0 bg-gradient-to-b from-slate-950 to-slate-900"></div>
	<div
		class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-veraGold/10 rounded-full blur-3xl"
	></div>

	<div class="relative max-w-4xl mx-auto px-6 lg:px-8 text-center">
		<p class="text-xs font-semibold tracking-widest text-veraBronze uppercase mb-4">
			Pilot Q3 2026
		</p>
		<h2 class="font-serif text-3xl lg:text-6xl tracking-tight mb-6 leading-tight">
			Testa på ett <span class="text-veraBronze">skarpt ärende</span>.
		</h2>
		<p class="text-lg lg:text-xl text-slate-400 leading-relaxed mb-10 max-w-2xl mx-auto">
			Begränsat antal pilotbyråer. Installation i testmiljö, anonymiserat ärende, sammanfattning och
			utkast på under fem minuter — lokalt.
		</p>

		<div
			class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl p-6 lg:p-10 max-w-xl mx-auto text-left"
		>
			<form class="space-y-4" (submit)="$event.preventDefault()">
				<div class="grid sm:grid-cols-2 gap-4">
					<div>
						<label class="block text-xs font-medium text-slate-400 mb-2">Namn</label>
						<input
							type="text"
							class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-veraGold transition-colors"
							placeholder="Anna Andersson"
						/>
					</div>
					<div>
						<label class="block text-xs font-medium text-slate-400 mb-2">Byrå</label>
						<input
							type="text"
							class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-veraGold transition-colors"
							placeholder="Advokatfirman Exempel"
						/>
					</div>
				</div>
				<div>
					<label class="block text-xs font-medium text-slate-400 mb-2">E-post</label>
					<input
						type="email"
						class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-veraGold transition-colors"
						placeholder="anna@exempel.se"
					/>
				</div>
				<div>
					<label class="block text-xs font-medium text-slate-400 mb-2"
						>Vad ska testas? <span class="text-slate-600">(valfritt)</span></label
					>
					<textarea
						rows="3"
						class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-veraGold transition-colors resize-none"
						placeholder="T.ex. migrationsöverklagande, FUP-sammanfattning..."
					></textarea>
				</div>
				<button
					type="submit"
					class="w-full inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-lg bg-veraGold hover:bg-veraBronze text-slate-950 font-semibold transition-all shadow-xl shadow-veraGold/20 hover:shadow-veraGold/40"
				>
					Boka demo
					<span aria-hidden="true">→</span>
				</button>
				<p class="text-xs text-slate-500 text-center pt-2">Svar inom 24 timmar.</p>
			</form>
		</div>
	</div>
</section>
