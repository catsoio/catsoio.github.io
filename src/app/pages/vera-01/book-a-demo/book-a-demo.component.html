<section id="contact" class="py-16 lg:py-24">
	<div class="mx-auto max-w-7xl px-6">
		<div class="grid place-items-center">
			<div class="w-full max-w-xl">
				<h2 class="text-center text-2xl sm:text-3xl font-semibold">Kontakta oss</h2>
				<p class="mt-3 text-center text-white/70">Har du frågor om VERA‑01? Hör gärna av dig.</p>

				<form class="mt-8 grid gap-6" [formGroup]="form" (ngSubmit)="submit()">
					<div class="sr-only">
						<!-- Honeypot -->
						<input type="text" tabindex="-1" autocomplete="off" formControlName="website" />
					</div>

					<label class="block">
						<span class="block text-sm text-white/70">Namn</span>
						<input
							type="text"
							placeholder="För- och efternamn"
							class="mt-2 w-full rounded-xl bg-white/5 px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-veraGold"
							formControlName="name"
							[attr.aria-invalid]="form.controls.name.invalid && form.controls.name.touched"
						/>
						<span
							class="mt-1 block text-xs text-red-400"
							*ngIf="form.controls.name.invalid && form.controls.name.touched"
						>
							Ange ett giltigt namn.
						</span>
					</label>

					<label class="block">
						<span class="block text-sm text-white/70">E-post</span>
						<input
							type="email"
							placeholder="namn.efternamn@byra.se"
							class="mt-2 w-full rounded-xl bg-white/5 px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-veraGold"
							formControlName="email"
							[attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
						/>
						<span
							class="mt-1 block text-xs text-red-400"
							*ngIf="form.controls.email.invalid && form.controls.email.touched"
						>
							Ange en giltig e-postadress.
						</span>
					</label>

					<label class="block">
						<span class="block text-sm text-white/70">Byrå</span>
						<input
							type="text"
							placeholder="byrå"
							class="mt-2 w-full rounded-xl bg-white/5 px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-veraGold"
							formControlName="firm"
							[attr.aria-invalid]="form.controls.firm.invalid && form.controls.firm.touched"
						/>
						<span
							class="mt-1 block text-xs text-red-400"
							*ngIf="form.controls.firm.invalid && form.controls.firm.touched"
						>
							Ange byråns namn.
						</span>
					</label>

					<label class="block">
						<span class="block text-sm text-white/70">Meddelande</span>
						<textarea
							rows="4"
							placeholder="Meddelande"
							class="mt-2 w-full rounded-xl bg-white/5 px-4 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-veraGold"
							formControlName="message"
						></textarea>
					</label>

					<button
						type="submit"
						[disabled]="loading()"
						class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-veraGold to-veraBronze px-6 py-3 text-sm font-semibold text-black transition-transform duration-200 hover:translate-y-0.5 hover:opacity-95 disabled:opacity-50 disabled:cursor-not-allowed"
					>
						<span *ngIf="!loading()">Skicka</span>
						<span *ngIf="loading()">Skickar…</span>
					</button>

					<p class="text-sm text-red-400" *ngIf="error()">{{ error() }}</p>
				</form>
			</div>
		</div>
	</div>
</section>

<!-- Bekräftelse-popup -->
@if (success()) {
	<div class="fixed inset-0 z-50 flex items-end justify-center sm:items-center">
		<div class="absolute inset-0 bg-black/60" (click)="success.set(null)"></div>
		<div
			class="relative z-10 w-full max-w-md rounded-2xl border border-white/10 bg-zinc-950 p-8 shadow-xl text-center"
		>
			<div
				class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-veraGold/15"
			>
				<svg class="h-6 w-6 text-veraGold" viewBox="0 0 20 20" fill="currentColor">
					<path
						fill-rule="evenodd"
						d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
						clip-rule="evenodd"
					/>
				</svg>
			</div>
			<h3 class="text-lg font-semibold text-white">Tack för ditt meddelande!</h3>
			<p class="mt-2 text-sm text-zinc-400">
				Vi har tagit emot din förfrågan och återkommer via e‑post inom kort.
			</p>
			<button
				type="button"
				(click)="success.set(null)"
				class="mt-6 rounded-md bg-veraGold px-6 py-2.5 text-sm font-semibold text-black shadow-sm hover:opacity-90"
			>
				Stäng
			</button>
		</div>
	</div>
}
