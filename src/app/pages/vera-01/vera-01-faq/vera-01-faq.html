<section id="faq" class="relative py-20 lg:py-32 border-t border-slate-800/50">
	<div class="max-w-4xl mx-auto px-6 lg:px-8">
		<div class="mb-16 text-center">
			<p class="text-xs font-semibold tracking-widest text-veraBronze uppercase mb-4">FAQ</p>
			<h2 class="font-serif text-3xl lg:text-5xl tracking-tight">Frågor och svar.</h2>
		</div>

		<div class="space-y-3">
			@for (item of faqItems; track item.question; let i = $index) {
			<div
				class="bg-slate-900/40 border border-slate-800 rounded-xl overflow-hidden transition-all"
				[class.border-veraGold-30]="openFaqIndex() === i"
			>
				<button
					(click)="toggleFaq(i)"
					class="w-full text-left p-5 lg:p-6 flex items-center justify-between gap-4 hover:bg-slate-900/60 transition-colors"
				>
					<span class="font-medium text-slate-100">{{ item.question }}</span>
					<span
						class="text-veraBronze transition-transform flex-shrink-0"
						[class.rotate-45]="openFaqIndex() === i"
						>+</span
					>
				</button>
				@if (openFaqIndex() === i) {
				<div class="px-5 lg:px-6 pb-5 lg:pb-6 text-slate-400 leading-relaxed">
					{{ item.answer }}
				</div>
				}
			</div>
			}
		</div>
	</div>
</section>
